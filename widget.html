<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WSB AI Club Events</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      color: #1a1a1a;
      padding: 8px;
    }

    #status {
      text-align: center;
      padding: 32px 16px;
      color: #666;
      font-size: 15px;
    }

    #events-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .event-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .event-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }

    .event-date-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #c5050c;
      color: #ffffff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      width: fit-content;
      letter-spacing: 0.3px;
    }

    .event-name {
      font-size: 17px;
      font-weight: 700;
      color: #111827;
      line-height: 1.3;
    }

    .event-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .event-meta-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13.5px;
      color: #374151;
    }
    .event-meta-row svg {
      flex-shrink: 0;
      opacity: 0.55;
    }

    .event-description {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
      border-top: 1px solid #f3f4f6;
      padding-top: 8px;
    }

    .event-description.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .expand-btn {
      font-size: 12px;
      color: #c5050c;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-top: 2px;
      font-weight: 600;
    }
    .expand-btn:hover { text-decoration: underline; }

    .no-events {
      text-align: center;
      padding: 48px 24px;
      color: #9ca3af;
      font-size: 15px;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>

<div id="status">Loading events…</div>
<div id="events-list" hidden></div>

<script>
  function buildApiUrl() {
    return "/api/events";
  }

  function formatDate(gcalDateTime) {
    const iso = gcalDateTime.dateTime || gcalDateTime.date;
    if (!iso) return "TBD";
    return new Date(iso).toLocaleDateString("en-US", {
      weekday: "short", month: "short", day: "numeric"
    });
  }

  function formatTime(gcalDateTime) {
    if (!gcalDateTime.dateTime) return "";
    return new Date(gcalDateTime.dateTime).toLocaleTimeString("en-US", {
      hour: "numeric", minute: "2-digit"
    });
  }

  function formatTimeRange(start, end) {
    const s = formatTime(start);
    const e = formatTime(end);
    if (!s) return "All day";
    return e ? `${s} – ${e}` : s;
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function cleanDescription(raw) {
    if (!raw) return "";
    const cutoff = raw.indexOf("📱 Flare Event Details");
    return cutoff !== -1 ? raw.slice(0, cutoff).trim() : raw.trim();
  }

  function renderRow(item) {
    const card = document.createElement("div");
    card.className = "event-card";

    const timeRange = formatTimeRange(item.start, item.end);
    const location  = item.location || "";
    const descText  = cleanDescription(item.description);
    const isLong    = descText.length > 300;
    const desc      = descText ? `
      <div class="event-description${isLong ? " collapsed" : ""}">${escapeHtml(descText)}</div>
      ${isLong ? `<button class="expand-btn">Show more</button>` : ""}
    ` : "";

    card.innerHTML = `
      <div class="event-date-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        ${escapeHtml(formatDate(item.start))}
      </div>
      <div class="event-name">${escapeHtml(item.summary || "Untitled Event")}</div>
      <div class="event-meta">
        <div class="event-meta-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          ${escapeHtml(timeRange)}
        </div>
        ${location ? `
        <div class="event-meta-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          ${escapeHtml(location)}
        </div>` : ""}
      </div>
      ${desc}
    `;

    const btn = card.querySelector(".expand-btn");
    if (btn) {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const descEl = card.querySelector(".event-description");
        const collapsed = descEl.classList.toggle("collapsed");
        btn.textContent = collapsed ? "Show more" : "Show less";
      });
    }

    return card;
  }

  async function loadEvents() {
    const statusEl = document.getElementById("status");
    const listEl   = document.getElementById("events-list");

    try {
      const res = await fetch(buildApiUrl());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const items = data.items || [];

      statusEl.hidden = true;
      listEl.hidden   = false;

      if (items.length === 0) {
        listEl.innerHTML = `<div class="no-events">No upcoming events yet.<br/>Check back soon!</div>`;
        return;
      }

      items.forEach((item) => listEl.appendChild(renderRow(item)));

    } catch (err) {
      statusEl.textContent = "⚠️ Could not load events. Please try again later.";
      console.error("Event fetch error:", err);
    }
  }

  loadEvents();
</script>
</body>
</html>
