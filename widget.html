<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WSB AI Club Events</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      color: #1a1a1a;
      padding: 8px;
    }

    #status {
      text-align: center;
      padding: 32px 16px;
      color: #666;
      font-size: 15px;
    }

    #events-list {
      display: flex;
      flex-direction: column;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .event-row {
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .event-row:last-child { border-bottom: none; }
    .event-row:hover { background: #fafafa; }
    .event-row.open { background: #fafafa; }

    .event-row-main {
      display: grid;
      grid-template-columns: 110px 1fr auto auto;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
    }

    .event-date {
      font-size: 12.5px;
      font-weight: 700;
      color: #c5050c;
      white-space: nowrap;
    }

    .event-name {
      font-size: 14.5px;
      font-weight: 600;
      color: #111827;
      line-height: 1.3;
    }

    .event-time {
      font-size: 12.5px;
      color: #6b7280;
      white-space: nowrap;
    }

    .event-location {
      font-size: 12.5px;
      color: #6b7280;
      white-space: nowrap;
    }

    .event-chevron {
      font-size: 11px;
      color: #9ca3af;
      margin-left: 8px;
      transition: transform 0.2s ease;
      display: inline-block;
    }
    .event-row.open .event-chevron { transform: rotate(180deg); }

    .event-desc {
      display: none;
      padding: 0 20px 16px 20px;
      font-size: 13px;
      color: #4b5563;
      line-height: 1.6;
      border-top: 1px solid #f3f4f6;
      padding-top: 12px;
    }
    .event-row.open .event-desc { display: block; }

    .no-events {
      text-align: center;
      padding: 48px 24px;
      color: #9ca3af;
      font-size: 15px;
    }
  </style>
</head>
<body>

<div id="status">Loading events…</div>
<div id="events-list" hidden></div>

<script>
  function buildApiUrl() {
    return "/api/events";
  }

  function formatDate(gcalDateTime) {
    const iso = gcalDateTime.dateTime || gcalDateTime.date;
    if (!iso) return "TBD";
    return new Date(iso).toLocaleDateString("en-US", {
      weekday: "short", month: "short", day: "numeric"
    });
  }

  function formatTime(gcalDateTime) {
    if (!gcalDateTime.dateTime) return "";
    return new Date(gcalDateTime.dateTime).toLocaleTimeString("en-US", {
      hour: "numeric", minute: "2-digit"
    });
  }

  function formatTimeRange(start, end) {
    const s = formatTime(start);
    const e = formatTime(end);
    if (!s) return "All day";
    return e ? `${s} – ${e}` : s;
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function cleanDescription(raw) {
    if (!raw) return "";
    const cutoff = raw.indexOf("📱 Flare Event Details");
    return cutoff !== -1 ? raw.slice(0, cutoff).trim() : raw.trim();
  }

  function renderRow(item) {
    const row = document.createElement("div");
    row.className = "event-row";

    const timeRange = formatTimeRange(item.start, item.end);
    const location  = item.location || "";
    const descText  = cleanDescription(item.description);

    row.innerHTML = `
      <div class="event-row-main">
        <div class="event-date">${escapeHtml(formatDate(item.start))}</div>
        <div class="event-name">${escapeHtml(item.summary || "Untitled Event")}</div>
        <div class="event-time">${escapeHtml(timeRange)}</div>
        <div class="event-location">${escapeHtml(location)}</div>
        ${descText ? `<span class="event-chevron">▼</span>` : ""}
      </div>
      ${descText ? `<div class="event-desc">${escapeHtml(descText)}</div>` : ""}
    `;

    if (descText) {
      row.addEventListener("click", () => row.classList.toggle("open"));
    }

    return row;
  }

  async function loadEvents() {
    const statusEl = document.getElementById("status");
    const listEl   = document.getElementById("events-list");

    try {
      const res = await fetch(buildApiUrl());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const items = data.items || [];

      statusEl.hidden = true;
      listEl.hidden   = false;

      if (items.length === 0) {
        listEl.innerHTML = `<div class="no-events">No upcoming events yet.<br/>Check back soon!</div>`;
        return;
      }

      items.forEach((item) => listEl.appendChild(renderRow(item)));

    } catch (err) {
      statusEl.textContent = "⚠️ Could not load events. Please try again later.";
      console.error("Event fetch error:", err);
    }
  }

  loadEvents();
</script>
</body>
</html>
